<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Atrapa la pasta</title>
    <link rel="icon" type="image/png" href="favicon.png?v=20260508-1">
    <link rel="stylesheet" href="styles.css?v=20260509-1">
  </head>
  <body>
    <main class="app-shell" id="app">
      <section class="start-screen" id="startScreen">
        <div class="brand-card">
          <p class="eyebrow">Concurso familiar</p>
          <h1>Atrapa la pasta</h1>
          <div class="start-hero">
            <img src="portada.png?v=20260508-1" alt="Portada de Atrapa la pasta">
          </div>
          <p id="startMessage">Preparando preguntas...</p>
          <button class="start-button" id="startButton" type="button" disabled>Comenzar</button>
        </div>
      </section>

      <section class="game-screen is-hidden" id="gameScreen" aria-live="polite">
        <header class="top-bar">
          <div>
            <div class="round-meta">
              <p class="eyebrow" id="roundLevel">Ronda</p>
              <p class="difficulty-badge" id="difficultyBadge">Nivel</p>
            </div>
            <h1 id="roundTitle">Atrapa la pasta</h1>
          </div>
          <div class="top-actions">
            <div class="lifelines" aria-label="Comodines">
              <button class="lifeline" id="lifelineFifty" data-lifeline="fifty" type="button" aria-label="Comodín 50%">
                <span class="lifeline-icon lifeline-fifty">50%</span>
              </button>
              <button class="lifeline" id="lifelineCall" data-lifeline="call" type="button" aria-label="Comodín llamada">
                <span class="lifeline-icon lifeline-phone" aria-hidden="true"></span>
              </button>
              <button class="lifeline" id="lifelineHint" data-lifeline="hint" type="button" aria-label="Comodín pista">
                <span class="lifeline-icon lifeline-search" aria-hidden="true"></span>
              </button>
            </div>
            <div class="timer-card" id="timerCard">
              <strong id="timer">02:00</strong>
            </div>
          </div>
        </header>

        <section class="stage" id="stage">
          <div class="theme-choice is-hidden" id="themeChoice"></div>
          <div class="question-card" id="questionCard">
            <p class="phase-label" id="phaseLabel">Pregunta</p>
            <div class="question-flipper">
              <div class="question-face question-front">
                <h2 id="questionText"></h2>
              </div>
              <div class="question-face question-back" aria-hidden="true">
                <span>?</span>
              </div>
            </div>
          </div>
          <div class="options-grid" id="optionsGrid"></div>
          <button class="advance-zone" id="advanceZone" type="button" aria-label="Avanzar">
            <span>Avanzar</span>
            <span class="advance-timer-icon" aria-hidden="true"></span>
          </button>
        </section>

      </section>

      <section class="final-screen is-hidden" id="finalScreen" aria-live="polite">
        <div class="brand-card final-card">
          <p class="eyebrow">Fin de la partida</p>
          <h1>¡Enhorabuena!</h1>
          <div class="start-hero final-hero">
            <img src="fin.png?v=20260509-1" alt="Celebración final de Atrapa la pasta">
          </div>
          <p class="final-message">Habéis llegado al final de Atrapa la pasta. ¡Gran trabajo, equipo!</p>
        </div>
      </section>

      <div class="hint-modal is-hidden" id="hintModal" role="dialog" aria-modal="true" aria-labelledby="hintModalTitle">
        <div class="hint-modal-card">
          <button class="hint-close" id="hintCloseButton" type="button" aria-label="Cerrar pista">×</button>
          <p class="eyebrow" id="hintModalTitle">Pista</p>
          <p id="hintModalText"></p>
        </div>
      </div>
    </main>

    <script src="app.js?v=20260509-1"></script>
  </body>
</html>
